name = "trimble-jig"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[env.production]
routes = [
  { pattern = "trimble-jig.pages.dev", zone_name = "pages.dev" }
]

[build]
command = "npm run build"
cwd = "."
watch_paths = ["src/**/*.ts", "src/**/*.tsx", "src/**/*.css"]

[build.upload]
format = "modules"
